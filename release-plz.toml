[workspace]
# Set to true only if publishing to crates.io (add CARGO_REGISTRY_TOKEN secret).
#
# IMPORTANT — workflow implications of `publish = false`:
# release-plz does NOT auto-bump the version from conventional commits in this
# mode. Its `Diff::should_update_version()` requires the package to exist in a
# registry; with publish=false that lookup is skipped and bump detection is
# disabled. To cut a release, hand-edit Cargo.toml + Cargo.lock + CHANGELOG.md
# and commit `chore: release vX.Y.Z`. release-plz then sees Cargo.toml ahead of
# the latest tag, creates the tag, opens a draft GitHub Release, and the
# binary-build workflow attaches artifacts. The post-bump plumbing is fully
# automatic — only the bump decision is manual.
#
# For a library going to crates.io, set publish = true and conventional commits
# drive version bumps as advertised.
publish = false
# Create the tag and GitHub Release when Cargo.toml is ahead of the latest tag.
git_release_enable = true
git_tag_enable = true
# Generate CHANGELOG entries from conventional commits at release time.
# Don't manually maintain a `## [Unreleased]` block — release-plz inserts its
# own version sections, and doing both fights itself.
changelog_update = true
# Create release as draft so the binary-build workflow can attach
# artifacts before the release goes public. The publish workflow flips
# it to non-draft after upload.
git_release_draft = true

[changelog]
header = """# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
