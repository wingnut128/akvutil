name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.2.2)"
        required: true
        type: string
      allow_republish:
        description: "Overwrite assets on an ALREADY-PUBLISHED (non-draft) release"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - name: Harden the runner (block egress)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          # Toolchain + crate fetch + source checkout. harden-runner already
          # allows the essential GitHub Actions control-plane endpoints.
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            static.rust-lang.org:443
            index.crates.io:443
            static.crates.io:443

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Free runner disk space
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL >/dev/null 2>&1
          sudo docker image prune -af >/dev/null 2>&1
          df -h / | tail -1

      - name: Install Rust stable
        run: |
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }}

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-${{ matrix.target }}-

      - name: Validate tag format
        run: |
          if ! echo "$RELEASE_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: tag '$RELEASE_TAG' is not vX.Y.Z"
            exit 1
          fi

      - name: Validate Cargo.toml version matches tag
        run: |
          VERSION="${RELEASE_TAG#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$CARGO_VERSION" != "$VERSION" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VERSION) does not match tag ($VERSION)"
            exit 1
          fi

      - name: Build release binary
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$TARGET"

      - name: Package binary
        env:
          TARGET: ${{ matrix.target }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          mkdir -p dist
          cp "target/${TARGET}/release/akvutil" "dist/akvutil-${VERSION}-${TARGET}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: akvutil-${{ matrix.target }}
          path: dist/akvutil-*
          if-no-files-found: error

  publish:
    name: Attach binaries to release
    needs: build
    runs-on: ubuntu-latest
    # Gate the write-privileged publish step behind a manual approval
    # (required reviewer on the `release` environment) so no one can rebuild
    # and clobber a published release's binaries without a second-party sign-off.
    environment: release
    permissions:
      contents: write
      id-token: write # mint the OIDC token used to sign the provenance attestation
      attestations: write # record the attestation on the repo
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Harden the runner (block egress)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          # GitHub release upload + Sigstore endpoints for build provenance.
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            uploads.github.com:443
            objects.githubusercontent.com:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "dist/akvutil-*"

      - name: Upload binaries and publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          # Only true when a human explicitly opts in via workflow_dispatch.
          ALLOW_REPUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_republish || false }}
        run: |
          set -euo pipefail
          is_draft=$(gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft' 2>/dev/null || echo missing)
          if [ "$is_draft" = "missing" ]; then
            echo "ERROR: release $RELEASE_TAG not found; expected release-plz to have created a draft."
            exit 1
          fi
          # Refuse to overwrite the assets of an already-published release unless
          # a human deliberately re-ran the workflow with allow_republish=true.
          if [ "$is_draft" != "true" ] && [ "$ALLOW_REPUBLISH" != "true" ]; then
            echo "ERROR: release $RELEASE_TAG is already published; refusing to overwrite its assets."
            echo "Re-run via workflow_dispatch with allow_republish=true to intentionally replace them."
            exit 1
          fi
          gh release upload "$RELEASE_TAG" dist/akvutil-* --clobber
          gh release edit "$RELEASE_TAG" --draft=false
