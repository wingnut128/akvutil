name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (block egress)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            static.rust-lang.org:443
            index.crates.io:443
            static.crates.io:443

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust stable
        run: |
          rustup update stable
          rustup default stable
          rustup component add rustfmt clippy

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ci-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ci-

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (block egress)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          # Same as test, plus the RustSec advisory DB is cloned from GitHub.
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            static.rust-lang.org:443
            index.crates.io:443
            static.crates.io:443

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust stable
        run: |
          rustup update stable
          rustup default stable

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            ~/.cargo/bin/
          key: audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: audit-

      - name: Install cargo-audit
        # Skip the build when a cached ~/.cargo/bin/cargo-audit was restored;
        # `cargo install` errors ("binary already exists") on a warm cache.
        run: command -v cargo-audit >/dev/null 2>&1 || cargo install cargo-audit --locked

      # Fail the build on any crate with a known RUSTSEC advisory so a
      # vulnerable dependency cannot be compiled into a released binary.
      - name: Audit dependencies
        run: cargo audit
